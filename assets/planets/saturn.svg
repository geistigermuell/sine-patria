<svg xmlns="http://www.w3.org/2000/svg" width="52" height="36" viewBox="0 0 52 36">
  <defs>
    <radialGradient id="g" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#F8ECA8"/>
      <stop offset="100%" stop-color="#A08830"/>
    </radialGradient>
  </defs>
  <!-- back rings -->
  <ellipse cx="26" cy="18" rx="25" ry="7" fill="none" stroke="#C8A840" stroke-width="4" opacity="0.45"/>
  <!-- planet -->
  <circle cx="26" cy="18" r="15" fill="url(#g)"/>
  <!-- front rings (clipped lower half) -->
  <ellipse cx="26" cy="18" rx="25" ry="7" fill="none" stroke="#C8A840" stroke-width="4" opacity="0.65"
           clip-path="url(#rclip)"/>
  <defs>
    <clipPath id="rclip">
      <rect x="0" y="18" width="52" height="18"/>
    </clipPath>
  </defs>
</svg>
